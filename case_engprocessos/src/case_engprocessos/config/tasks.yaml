intake_structuring_task:
  description: >
    Receber a solicitação operacional não estruturada enviada pela área de negócio.

    Objetivo:
    - Normalizar a linguagem;
    - Remover ambiguidades;
    - Identificar contexto operacional;
    - Identificar processo impactado;
    - Identificar áreas envolvidas;
    - Identificar sistemas mencionados;
    - Identificar sintomas operacionais;
    - Identificar lacunas críticas de contexto.

    Regras:
    - Ser objetivo e direto;
    - Evitar repetições;
    - Não criar explicações extensas;
    - Não adicionar informações não presentes na solicitação.

    Solicitação recebida:
    {topic}

  expected_output: >
    Markdown obrigatório usando exatamente esta estrutura:

    ## 1. Solicitação Normalizada

    ## 2. Processo Impactado

    ## 3. Áreas Envolvidas

    ## 4. Sistemas Mencionados

    ## 5. Sintomas Identificados

    ## 6. Lacunas de Contexto

    Respostas curtas, objetivas e padronizadas.

  agent: intake_analyst_agent


process_diagnosis_task:
  description: >
    Analisar a solicitação estruturada e identificar possíveis gargalos operacionais,
    riscos, handoffs excessivos, retrabalho e hipóteses iniciais de causa-raiz.

    Considerar:
    - Eficiência operacional;
    - Experiência do cliente;
    - Risco operacional;
    - Dependência manual;
    - Falhas de integração;
    - Retrabalho;
    - SLA.

    Regras:
    - Não repetir informações já existentes;
    - Utilizar linguagem executiva;
    - Priorizar clareza e síntese.

  expected_output: >
    Markdown obrigatório usando exatamente esta estrutura:

    ## 1. Gargalos Identificados

    ## 2. Possíveis Causas-Raiz

    ## 3. Impactos Operacionais

    ## 4. Riscos Associados

    ## 5. Hipóteses de Investigação

    Utilizar bullets curtos.

  agent: process_diagnosis_agent


prioritization_task:
  description: >
    Classificar criticidade e prioridade operacional da solicitação.

    Considerar:
    - Impacto financeiro;
    - Impacto operacional;
    - Risco regulatório;
    - Impacto no cliente;
    - Volume;
    - Frequência;
    - SLA;
    - Retrabalho.

    Regras:
    - Utilizar classificação padronizada;
    - Justificar de forma curta;
    - Evitar textos longos.

  expected_output: >
    Markdown obrigatório usando exatamente esta estrutura:

    ## 1. Criticidade

    Valor permitido:
    - Baixa
    - Média
    - Alta
    - Crítica

    ## 2. Score de Criticidade

    Valor inteiro entre 1 e 5.

    ## 3. Justificativa

    ## 4. Prioridade Recomendada

    Valor permitido:
    - Backlog
    - Prioridade Média
    - Prioridade Alta
    - Ação Imediata

  agent: prioritization_agent


solution_strategy_task:
  description: >
    Definir abordagem inicial recomendada para análise e evolução do processo.

    Considerar:
    - Engenharia de Processos;
    - Lean;
    - BPM;
    - Quick wins;
    - Governança operacional;
    - Redução de retrabalho;
    - Padronização;
    - Automação.

    Regras:
    - Ser pragmático;
    - Priorizar ações executáveis;
    - Não gerar explicações acadêmicas.

  expected_output: >
    Markdown obrigatório usando exatamente esta estrutura:

    ## 1. Abordagem Recomendada

    ## 2. Quick Wins

    ## 3. Ações Estruturantes

    ## 4. Áreas que Devem Participar

    ## 5. Próximos Passos

    Utilizar bullets curtos e objetivos.

  agent: solution_strategy_agent


governance_reporting_task:
  description: >
    Consolidar todas as análises anteriores e gerar o relatório executivo final
    para apoio à tomada de decisão da Engenharia de Processos.

    O relatório deve ser:
    - Executivo;
    - Objetivo;
    - Padronizado;
    - Rastreável;
    - Consistente entre execuções.

    Regras obrigatórias:
    - Não alterar os títulos;
    - Não alterar a estrutura;
    - Não remover seções;
    - Não gerar conteúdo fora do template;
    - Não explicar o JSON;
    - Não usar markdown dentro do JSON.

  expected_output: >
    A resposta final deve possuir obrigatoriamente DUAS PARTES.

    --------------------------------------------------
    PARTE 1 — RELATÓRIO EXECUTIVO
    --------------------------------------------------

    Usar exatamente esta estrutura:

    # Análise Estruturada da Solicitação

    ## 1. Resumo Executivo

    ## 2. Solicitação Normalizada

    ## 3. Processo Impactado

    ## 4. Áreas Envolvidas

    ## 5. Sistemas Mencionados

    ## 6. Gargalos Identificados

    ## 7. Possíveis Causas-Raiz

    ## 8. Criticidade e Prioridade

    ## 9. Impactos Operacionais

    ## 10. Abordagem Recomendada

    ## 11. Quick Wins

    ## 12. Próximos Passos

    ## 13. Encaminhamento Recomendado

    O relatório deve:
    - Ser conciso;
    - Ser padronizado;
    - Utilizar bullets curtos;
    - Evitar repetição;
    - Não ultrapassar 700 palavras.

    --------------------------------------------------
    PARTE 2 — JSON DE INTEGRAÇÃO
    --------------------------------------------------

    Gerar obrigatoriamente JSON válido usando EXATAMENTE esta estrutura:

    {
      "id_externo": "UUID_OU_IDENTIFICADOR",
      "data_criacao": "YYYY-MM-DD HH:MM:SS",
      "origem": "crew_ai_streamlit",
      "tipo_registro": "demanda_engenharia_processos",
      "solicitacao": {
        "texto_original": "texto",
        "resumo_executivo": "texto",
        "processo_impactado": "texto"
      },
      "classificacao": {
        "criticidade": "Baixa|Média|Alta|Crítica",
        "score_criticidade": 1
      },
      "diagnostico": {
        "impacto_operacional": "texto",
        "gargalos_identificados": [],
        "causas_raiz_hipoteticas": []
      },
      "recomendacao": {
        "abordagem_recomendada": "texto",
        "proximos_passos": [],
        "encaminhamento": "texto"
      },
      "governanca": {
        "status_integracao": "pronto_para_envio",
        "sistema_destino": "backlog_engenharia_processos",
        "versao_payload": "1.0"
      }
    }

    Regras do JSON:
    - Não alterar nomes das chaves;
    - Não remover campos;
    - Não adicionar novos campos;
    - Sempre preencher todos os campos;
    - Se não houver informação, usar "não informado";
    - Listas devem ser arrays válidos;
    - Não usar markdown;
    - Não usar comentários;
    - JSON deve ser parseável.

  agent: governance_reporting_agent
  output_file: solicitacao_final.md

